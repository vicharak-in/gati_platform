name: Build and Deploy Sphinx Docs

on:
  push:
    branches:
      - main
    paths:
      - 'hardware/gati/docs/**'
      - 'software/gaticc/docs/**'
      - 'hardware/README.md'
      - 'docs/index.rst'
      - 'docs/conf.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install sphinx sphinxcontrib-bibtex myst-parser

      - name: Assemble docs into staging
        run: |
          mkdir -p staging/gati
          mkdir -p staging/gaticc

          # Master index and conf from main repo
          cp docs/index.rst staging/
          cp docs/conf.py staging/

          # refs.bib from gati submodule
          cp hardware/gati/docs/source/refs.bib staging/

          # Copy entire gati source folder as-is
          cp -r hardware/gati/docs/source/. staging/gati/

          # gaticc markdown docs
          cp software/gaticc/docs/*.md staging/gaticc/

          # hardware README as Hardware Generation
          cp hardware/README.md staging/hardware_overview.md

      - name: Build documentation
        run: |
          sphinx-build -b html staging/ build/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build